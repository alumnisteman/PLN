version: "3.9"

networks:
  erp_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:
  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - php
      - frontend
    networks:
      - erp_network
    restart: unless-stopped

  # ─── Laravel API (PHP-FPM) ─────────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage/app/private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-erp_db}
      - DB_USERNAME=${DB_USERNAME:-erp_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    networks:
      - erp_network
    restart: unless-stopped

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
    networks:
      - erp_network
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=${DB_DATABASE:-erp_db}
      - POSTGRES_USER=${DB_USERNAME:-erp_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network
    restart: unless-stopped

  # ─── Backup (scheduled) ────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    volumes:
      - ./backup:/backup
      - ./docker/backup/backup.sh:/backup.sh
    environment:
      - DB_HOST=postgres
      - DB_DATABASE=${DB_DATABASE:-erp_db}
      - DB_USERNAME=${DB_USERNAME:-erp_user}
      - DB_PASSWORD=${DB_PASSWORD}
    command: >
      sh -c "while true; do sh /backup.sh; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp_network
    restart: unless-stopped
